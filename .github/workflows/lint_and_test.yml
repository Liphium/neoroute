name: Go Lint and Test

# Triggers the workflow on push or pull request to the main branch
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-code:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Lint with release build tag
        run: go vet ./...

      - name: Formatting check
        run: test -z "$(find . -path './.cache' -prune -o -name '*.go' -exec gofmt -l {} +)"

  test-code:
    name: Test Code
    runs-on: ubuntu-latest
    needs: lint-code
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Clean caches
        run: |
          rm -f c.out
          go clean -cache -testcache

      - name: Run tests and generate coverage
        run: |
          go test -count=1 -covermode=atomic -coverprofile=c.out -coverpkg=./... ./...

      - name: Generate Go Coverage Badge
        uses: tj-actions/coverage-badge-go@v3
        with:
          filename: c.out

      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@v16
        id: verify-changed-files
        with:
          files: README.md

      - name: Commit changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "chore: Updated coverage badge."

      - name: Push changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ github.token }}
          branch: ${{ github.head_ref }}
